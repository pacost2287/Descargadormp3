<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PureMusic Player</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --card-bg: #1f1f1f;
            --accent-color: #ff0000;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            max-width: 500px;
            text-align: center;
            margin-bottom: 25px;
            padding-top: 10px;
        }

        header h1 {
            font-size: 1.6rem;
            font-weight: 700;
        }

        header span {
            color: var(--accent-color);
        }

        .main-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-card {
            background-color: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333;
            background-color: #2d2d2d;
            color: #fff;
            font-size: 1rem;
            outline: none;
        }

        .btn-process {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }

        .preview-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            display: none;
            flex-direction: column;
            gap: 15px;
            text-align: center;
        }

        .thumbnail {
            width: 100%;
            border-radius: 8px;
            aspect-ratio: 16/9;
            object-fit: cover;
            background-color: #333;
        }

        .video-title {
            font-size: 1.1rem;
            font-weight: 600;
        }

        audio {
            width: 100%;
            margin-top: 5px;
        }

        .btn-download {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: none;
            font-weight: 600;
            background-color: #28a745;
            color: white;
            cursor: pointer;
        }

        .loader {
            display: none;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>Pure<span>Music</span> Player</h1>
    </header>

    <div class="main-container">
        <div class="input-card">
            <div class="input-group">
                <input type="text" id="youtubeUrl" placeholder="Pegá el enlace de YouTube acá..." autocomplete="off">
                <button class="btn-process" onclick="procesarEnlace()">Cargar Contenido</button>
            </div>
        </div>

        <div class="loader" id="loader">Procesando audio libre de publicidad...</div>

        <div class="preview-card" id="previewCard">
            <img src="" alt="Miniatura" class="thumbnail" id="videoThumb">
            <div class="video-title" id="videoTitle">Cargando datos...</div>
            <audio id="audioPlayer" controls></audio>
            <button class="btn-download" onclick="descargarMp3()">Descargar MP3</button>
        </div>
    </div>

    <script>
        // Cambiamos a la API de yt-download, libre de restricciones CORS para sitios estáticos
        const API_BASE = "https://api.allorigins.win/get?url=";
        const TARGET_API = "https://savetube.me/api/v1/single/video";

        async function procesarEnlace() {
            const urlInput = document.getElementById('youtubeUrl').value.trim();
            const loader = document.getElementById('loader');
            const previewCard = document.getElementById('previewCard');
            const audioPlayer = document.getElementById('audioPlayer');
            const videoTitle = document.getElementById('videoTitle');
            const videoThumb = document.getElementById('videoThumb');

            if (urlInput === "") {
                alert("Por favor, ingresá un enlace de YouTube.");
                return;
            }

            loader.style.display = "block";
            previewCard.style.display = "none";
            audioPlayer.src = "";

            try {
                // Extraemos el ID del video de forma limpia
                const videoId = extraerIdYouTube(urlInput);
                if (!videoId) {
                    throw new Error("El enlace no parece un video válido de YouTube.");
                }

                // Seteamos la miniatura rápido para que veas que tu código reacciona al toque
                videoThumb.src = `https://img.youtube.com/vi/${videoId}/mqdefault.jpg`;

                // Usamos un puente CORS abierto (AllOrigins) para blindar la petición contra bloqueos del navegador móvil
                const urlFinalTarget = `${TARGET_API}?url=${encodeURIComponent('https://www.youtube.com/watch?v=' + videoId)}`;
                const respuesta = await fetch(API_BASE + encodeURIComponent(urlFinalTarget));
                
                if (!respuesta.ok) {
                    throw new Error("Error en la respuesta de la red.");
                }

                const datosSucios = await respuesta.json();
                // El puente mete la respuesta original dentro de una propiedad 'contents' como texto
                const datos = JSON.parse(datosSucios.contents);

                if (datos && datos.status === true && datos.data) {
                    loader.style.display = "none";
                    previewCard.style.display = "flex";

                    // Buscamos los flujos de audio disponibles en la respuesta de la API
                    const audios = datos.data.audio_formats;
                    if(audios && audios.length > 0) {
                        // Agarramos el primer flujo de audio disponible (suele ser el mejor)
                        const audioUrl = audios[0].url;
                        
                        audioPlayer.src = audioUrl;
                        videoTitle.textContent = datos.data.title || "Audio extraído con éxito ✓";
                        previewCard.dataset.downloadUrl = audioUrl;
                    } else {
                        throw new Error("No se encontraron pistas de audio para este video.");
                    }
                } else {
                    throw new Error("El servidor de conversión no reconoce el video o está saturado.");
                }

            } catch (error) {
                console.error(error);
                loader.style.display = "none";
                alert("Falla de la App: " + error.message);
            }
        }

        function extraerIdYouTube(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function descargarMp3() {
            const urlDescarga = document.getElementById('previewCard').dataset.downloadUrl;
            if (urlDescarga) {
                window.open(urlDescarga, '_blank');
            } else {
                alert("No hay ningún archivo cargado para descargar.");
            }
        }
    </script>
</body>
</html>
